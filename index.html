<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revelação de Cromos — Seleção de Alcântara 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #000;
  font-family: 'Barlow Condensed', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* Stars background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(1px 1px at 20% 30%, rgba(255,215,0,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 10%, white 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 60%, rgba(255,215,0,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 80%, white 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 70%, rgba(255,215,0,0.5) 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 20%, rgba(255,215,0,0.3) 0%, transparent 100%),
    radial-gradient(ellipse at top, #0d0800 0%, #000 60%);
  z-index: 0;
  pointer-events: none;
}

/* ── HEADER ── */
.header {
  width: 100%;
  text-align: center;
  padding: 32px 20px 20px;
  position: relative;
  z-index: 1;
}
.header-label {
  font-size: 12px;
  color: rgba(255,215,0,0.5);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.header-title {
  font-family: 'Bebas Neue';
  font-size: clamp(28px, 5vw, 52px);
  background: linear-gradient(135deg, #b8860b, #FFD700, #f0c040, #b8860b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 4px;
  line-height: 1;
}
.header-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 6px;
}

/* ── CONTROLS ── */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  justify-content: center;
  padding: 16px 20px 24px;
  position: relative;
  z-index: 1;
}

.btn {
  font-family: 'Bebas Neue';
  font-size: 16px;
  letter-spacing: 2px;
  padding: 10px 24px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
}
.btn-start {
  background: linear-gradient(135deg, #b8860b, #FFD700);
  color: #000;
}
.btn-start:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,215,0,0.4); }
.btn-pause {
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
}
.btn-pause:hover { background: rgba(255,255,255,0.2); }
.btn-prev, .btn-next {
  background: rgba(255,215,0,0.1);
  color: #FFD700;
  border: 1px solid rgba(255,215,0,0.3);
  font-size: 14px;
  padding: 10px 16px;
}
.btn-prev:hover, .btn-next:hover { background: rgba(255,215,0,0.2); }

.interval-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  color: rgba(255,255,255,0.5);
  font-size: 13px;
  letter-spacing: 1px;
}
.interval-wrap select {
  background: rgba(255,255,255,0.08);
  color: #fff;
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 4px;
  padding: 6px 10px;
  font-family: 'Barlow Condensed';
  font-size: 14px;
  cursor: pointer;
}

/* Progress bar */
.progress-wrap {
  width: 100%;
  max-width: 600px;
  padding: 0 20px 20px;
  position: relative;
  z-index: 1;
}
.progress-bar {
  width: 100%;
  height: 3px;
  background: rgba(255,215,0,0.1);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #b8860b, #FFD700);
  border-radius: 2px;
  transition: width 0.1s linear;
  width: 0%;
}
.progress-label {
  text-align: center;
  font-size: 11px;
  color: rgba(255,215,0,0.4);
  letter-spacing: 3px;
  margin-top: 6px;
}

/* ── STAGE ── */
.stage {
  width: 100%;
  max-width: 680px;
  padding: 0 16px 60px;
  position: relative;
  z-index: 1;
  min-height: 80vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── IDLE STATE ── */
.idle-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 20px;
  text-align: center;
  padding: 20px;
}
.idle-icon { font-size: 80px; opacity: 0.4; }
.idle-text {
  font-family: 'Bebas Neue';
  font-size: 24px;
  color: rgba(255,215,0,0.3);
  letter-spacing: 4px;
}

/* ── REVEAL BOX ── */
.reveal-box {
  width: 100%;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
.reveal-box.active { display: flex; }

/* Counter badge */
.counter-badge {
  font-family: 'Bebas Neue';
  font-size: 13px;
  color: rgba(255,215,0,0.6);
  letter-spacing: 4px;
  margin-bottom: 20px;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.counter-badge.visible { opacity: 1; }

/* Text reveal area */
.text-area {
  background: linear-gradient(135deg,
    rgba(255,215,0,0.05) 0%,
    rgba(0,0,0,0.6) 50%,
    rgba(255,215,0,0.03) 100%);
  border: 1px solid rgba(255,215,0,0.15);
  border-radius: 12px;
  padding: 28px 24px;
  width: 100%;
  margin-bottom: 32px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.text-area.visible {
  opacity: 1;
  transform: translateY(0);
}

.raridade-line {
  font-family: 'Bebas Neue';
  font-size: 13px;
  letter-spacing: 6px;
  margin-bottom: 12px;
  text-align: center;
}
.raridade-epica { color: #FFD700; }
.raridade-lendaria { color: #ff6b35; }

.player-name-reveal {
  font-family: 'Bebas Neue';
  font-size: clamp(28px, 5vw, 44px);
  background: linear-gradient(135deg, #b8860b, #FFD700, #f0c040);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 3px;
  text-align: center;
  line-height: 1;
  margin-bottom: 16px;
}

.reveal-text {
  font-size: clamp(14px, 2.5vw, 17px);
  color: rgba(255,255,255,0.85);
  line-height: 1.65;
  letter-spacing: 0.3px;
}

/* Typing cursor */
.cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: #FFD700;
  margin-left: 2px;
  vertical-align: middle;
  animation: blink 0.7s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Card reveal */
.card-wrap {
  opacity: 0;
  transform: scale(0.8) translateY(30px) rotate(-3deg);
  transition: opacity 0.8s cubic-bezier(0.34,1.56,0.64,1),
              transform 0.8s cubic-bezier(0.34,1.56,0.64,1);
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.card-wrap.visible {
  opacity: 1;
  transform: scale(1) translateY(0) rotate(0deg);
}
.card-wrap img {
  width: 100%;
  border-radius: 12px;
  box-shadow:
    0 0 0 3px rgba(255,215,0,0.5),
    0 0 40px rgba(255,215,0,0.3),
    0 20px 60px rgba(0,0,0,0.8);
}

/* Gold flash overlay on card reveal */
.card-flash {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(255,215,0,0.15) 0%, transparent 70%);
  pointer-events: none;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.card-flash.flash { opacity: 1; }

/* Nav dots */
.nav-dots {
  display: flex;
  gap: 8px;
  margin-top: 32px;
  flex-wrap: wrap;
  justify-content: center;
}
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(255,215,0,0.2);
  border: 1px solid rgba(255,215,0,0.3);
  cursor: pointer;
  transition: all 0.2s ease;
}
.dot.active {
  background: #FFD700;
  box-shadow: 0 0 8px rgba(255,215,0,0.6);
}
.dot.done {
  background: rgba(255,215,0,0.5);
}

@media(max-width:480px) {
  .controls { gap: 8px; }
  .btn { font-size: 14px; padding: 8px 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-label">★ Edição Especial ★</div>
  <div class="header-title">SELEÇÃO DE ALCÂNTARA</div>
  <div class="header-sub">FIFA World Cup 2026 · Revelação de Cromos</div>
</div>

<div class="controls">
  <button class="btn btn-prev" onclick="prevPlayer()">◀ ANTERIOR</button>
  <button class="btn btn-start" id="btnStart" onclick="toggleAuto()">▶ INICIAR AUTO</button>
  <button class="btn btn-next" onclick="nextPlayer()">PRÓXIMO ▶</button>
  <div class="interval-wrap">

      <option value="300">5 min</option>

</div>

  </div>

  <div class="reveal-box" id="revealBox">
    <div class="counter-badge" id="counterBadge"></div>
    <div class="text-area" id="textArea">

      <div class="player-name-reveal" id="playerName"></div>
      <span class="reveal-text" id="revealText"></span><span class="cursor" id="cursor"></span>
    </div>
    <div class="card-wrap" id="cardWrap">
      <img id="cardImg" src="" alt="">
    </div>
    <div class="nav-dots" id="navDots"></div>
  </div>
</div>

<div class="card-flash" id="cardFlash"></div>

de", "texto": "Caracóis perfeitos. Não toques. Não perguntes. Segue em frente. Sabe tudo sobre música. Tem programa de rádio. Não perde um concerto seja em que ponto do mapa estiver. Organiza os planos para o grupo com uma eficiência que envergonharia qualquer secretária-geral de sindicato. Agenda feita. Local reservado. Tu só tens de aparecer — e aparecer a horas. Barbie Jolas: glamour num copo, sempre. Imperial. Sempre a imperial. Feminista de convicção. Mandona assumida. Visão clara de como as coisas devem funcionar. Spoiler: à maneira dela. E normalmente ela tem razão. Dificuldade de coleção: baixa — ela já organizou o encontro."}, {"num": 5, "nome": "JOÃO SANTOS", "raridade": "ÉPICA", "raridade_stars": "⭐⭐⭐⭐⭐", "key": "s_joao_santos", "texto": "Alto de Santo Amaro. Alto, de bairro — e com uma energia de mar que não abandona mesmo em terra firme. Apelidado de Fofinho pelo grupo. O apelido diz tudo. E não diz nada. Conhece as melhores ondas. O problema é que quando lá chegas, as ondas já foram. Ele encolhe os ombros. O mar é assim. Tem gráfica e imprime tudo para toda a gente. Convites, cartazes, flyers, aquela coisa de que precisas para amanhã de manhã. É o recurso oficial do grupo. A uma jola nunca disse que não. É um princípio de vida, quase uma filosofia. O mar é a casa. A liberdade é o combustível. Dificuldade de coleção: média."}, {"num": 6, "nome": "LILIANA MARTINS", "raridade": "ÉPICA", "raridade_stars": "⭐⭐⭐⭐★", "key": "s_liliana_martins", "texto": "Aparece sem avisar — literalmente. Está sempre algures entre um fuso horário e outro, mas quando aterra, fá-lo com cabelos longos impecáveis e um bronze que envergonha quem passou o verão na praia sem sair do lugar. Falando em praia: é o seu habitat natural. O mar reconhece-a. Na cozinha, o seu domínio é a sopa — mas não qualquer sopa. Tem de ser biológica, consciente, alinhada com o universo. Uma sopa com propósito. Próximo destino: ninguém sabe nem ela. A sesta não é um luxo. É uma necessidade clínica e um ridade": "LENDÁRIA", "raridade_stars": "⭐⭐⭐⭐⭐", "key": "s_sofia_afonso", "texto": "Altura impactante — com ajuda. Sem ela, é necessário procurar um pouco mais abaixo, mas a presença é tão grande que o olhar vai sempre na direção certa. Tem uma voz de fado como há poucas. O tipo de voz que para uma sala sem avisar. Quem a quiser encontrar, não precisa de GPS — está no Egas, na rua, ao sol, de onde supervisiona o mundo com uma autoridade tranquila e um café provavelmente na mão. Caliente nas palavras como há poucos. Diz asneiras com uma elegância que deixa as pessoas a pensar se acabaram de ser insultadas ou de assistir a um momento cultural. Provavelmente os dois. Preferia ter um dos ofícios mais antigos do mundo a ser sócia do Sporting, diz ela porque no fundo queria ser beta do 2 de Maio. Tem uma tatuagem com uma data. A data essa errada. Ela sabe, mas como é pouco teimosa, existe a certeza que um dia irá mudar. Projeta uma confiança que afugentaria o maior dos bandidos — o que é notável dado o seu tamanho avassalador. No fundo é como um caniche: ladra muito, com estilo, com dicção perfeita — mas não morde. Dificuldade de coleção: nenhuma. Está no Egas. Sempre esteve."}];

let currentIndex = 0;
let autoTimer = null;
let progressTimer = null;
let isAuto = false;
let intervalSecs = 60;
let progressStart = null;
let typingTimeout = null;

function getInterval() {
  return parseInt(document.getElementById('intervalSelect').value) * 1000;
}

function updateInterval() {
  intervalSecs = parseInt(document.getElementById('intervalSelect').value);
  if (isAuto) {
    stopAuto();
    startAuto();
  }
}

function toggleAuto() {
  if (isAuto) { stopAuto(); }
  else { startAuto(); }
}

function startAuto() {
  isAuto = true;
  document.getElementById('btnStart').textContent = '⏸ PAUSAR';
  document.getElementById('btnStart').className = 'btn btn-pause';
  scheduleNext();
}

function stopAuto() {
  isAuto = false;
  clearTimeout(autoTimer);
  clearInterval(progressTimer);
  document.getElementById('btnStart').textContent = '▶ RETOMAR AUTO';
  document.getElementById('btnStart').className = 'btn btn-start';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressLabel').textContent = 'PAUSADO';
}

function scheduleNext() {
  clearTimeout(autoTimer);
  clearInterval(progressTimer);
  const ms = getInterval();
  progressStart = Date.now();
  
  progressTimer = setInterval(() => {
    const elapsed = Date.now() - progressStart;
    const pct = Math.min(100, (elapsed / ms) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    const rem = Math.max(0, Math.ceil((ms - elapsed) / 1000));
    document.getElementById('progressLabel').textContent = `PRÓXIMO CROMO EM ${rem}s`;
  }, 100);

  autoTimer = setTimeout(() => {
    nextPlayer();
    if (isAuto) scheduleNext();
  }, ms);
}

function showPlayer(index) {
  const p = PLAYERS[index];
  
  // Show reveal box, hide idle
  document.getElementById('idleScreen').style.display = 'none';
  document.getElementById('revealBox').classList.add('active');

  // Reset animations
  const textArea = document.getElementById('textArea');
  const cardWrap = document.getElementById('cardWrap');
  const counterBadge = document.getElementById('counterBadge');
  
  textArea.classList.remove('visible');
  cardWrap.classList.remove('visible');
  counterBadge.classList.remove('visible');
  document.getElementById('revealText').textContent = '';
  document.getElementById('cursor').style.display = 'inline-block';

  // Set content
  counterBadge.textContent = `CROMO ${String(index + 1).padStart(2,'0')} DE ${PLAYERS.length}`;
  
  const isLendaria = p.raridade === 'LENDÁRIA';
  const raridadeEl = document.getElementById('raridadeLine');
  raridadeEl.textContent = `${p.raridade_stars} RARIDADE: ${p.raridade} ${p.raridade_stars}`;
  raridadeEl.className = 'raridade-line ' + (isLendaria ? 'raridade-lendaria' : 'raridade-epica');
  
  document.getElementById('playerName').textContent = p.nome;
  document.getElementById('cardImg').src = IMAGES[p.key];

  // Update dots
  buildDots(index);

  // Animate in sequence
  setTimeout(() => { counterBadge.classList.add('visible'); }, 200);
  setTimeout(() => { textArea.classList.add('visible'); }, 400);
  setTimeout(() => { typeText(p.texto, index); }, 700);
}

function typeText(text, playerIndex) {
  clearTimeout(typingTimeout);
  const el = document.getElementById('revealText');
  el.textContent = '';
  let i = 0;
  const speed = Math.max(12, Math.min(30, Math.floor(getInterval() / text.length * 0.6)));
  
  function type() {
    if (i < text.length) {
      el.textContent += text[i];
      i++;
      typingTimeout = setTimeout(type, speed);
    } else {
      // Done typing — show card
      document.getElementById('cursor').style.display = 'none';
      setTimeout(() => showCard(playerIndex), 600);
    }
  }
  type();
}

function showCard(playerIndex) {
  if (currentIndex !== playerIndex) return; // guard
  const cardWrap = document.getElementById('cardWrap');
  cardWrap.classList.add('visible');
  
  // Flash effect
  const flash = document.getElementById('cardFlash');
  flash.classList.add('flash');
  setTimeout(() => flash.classList.remove('flash'), 400);
}

function nextPlayer() {
  currentIndex = (currentIndex + 1) % PLAYERS.length;
  showPlayer(currentIndex);
  if (isAuto) scheduleNext();
}

function prevPlayer() {
  currentIndex = (currentIndex - 1 + PLAYERS.length) % PLAYERS.length;
  showPlayer(currentIndex);
  if (isAuto) scheduleNext();
}

function goToPlayer(index) {
  currentIndex = index;
  showPlayer(index);
  if (isAuto) scheduleNext();
}

function buildDots(activeIndex) {
  const container = document.getElementById('navDots');
  container.innerHTML = '';
  PLAYERS.forEach((p, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === activeIndex ? ' active' : (i < activeIndex ? ' done' : ''));
    dot.title = p.nome;
    dot.onclick = () => goToPlayer(i);
    container.appendChild(dot);
  });
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') nextPlayer();
  if (e.key === 'ArrowLeft') prevPlayer();
  if (e.key === ' ') { e.preventDefault(); toggleAuto(); }
});

// Init dots
buildDots(-1);
</script>
