<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Seleção de Alcântara 2026 — Revelação</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  font-family:'Barlow Condensed',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(1px 1px at 15% 25%,rgba(255,215,0,0.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 8%,white 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 55%,rgba(255,215,0,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 8% 75%,white 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 65%,rgba(255,215,0,0.6) 0%,transparent 100%),
    radial-gradient(2px 2px at 55% 18%,rgba(255,215,0,0.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 90%,rgba(255,215,0,0.3) 0%,transparent 100%),
    radial-gradient(ellipse at top,#0d0800 0%,#000 60%);
  z-index:0;pointer-events:none;
}

/* HEADER */
.header{
  width:100%;text-align:center;
  padding:28px 20px 16px;
  position:relative;z-index:1;
}
.header-label{
  font-size:11px;color:rgba(255,215,0,0.5);
  letter-spacing:6px;text-transform:uppercase;margin-bottom:6px;
}
.header-title{
  font-family:'Bebas Neue';
  font-size:clamp(24px,5vw,48px);
  background:linear-gradient(135deg,#b8860b,#FFD700,#f0c040,#b8860b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;letter-spacing:4px;line-height:1;
}
.header-sub{
  font-size:12px;color:rgba(255,255,255,0.35);
  letter-spacing:4px;text-transform:uppercase;margin-top:5px;
}

/* PROGRESS */
.progress-wrap{
  width:100%;max-width:600px;
  padding:8px 20px 16px;
  position:relative;z-index:1;
}
.progress-bar{
  width:100%;height:4px;
  background:rgba(255,215,0,0.1);
  border-radius:2px;overflow:hidden;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,#b8860b,#FFD700);
  border-radius:2px;
  width:0%;
  transition:width 0.15s linear;
}
.progress-label{
  text-align:center;font-size:11px;
  color:rgba(255,215,0,0.4);letter-spacing:3px;
  margin-top:5px;
}

/* STAGE */
.stage{
  width:100%;max-width:640px;
  padding:0 16px 80px;
  position:relative;z-index:1;
  min-height:70vh;
  display:flex;flex-direction:column;align-items:center;
}

/* IDLE */
.idle-screen{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:60vh;gap:20px;text-align:center;padding:20px;
}
.idle-icon{font-size:80px;opacity:0.3;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.3;}50%{transform:scale(1.1);opacity:0.5;}}
.idle-title{
  font-family:'Bebas Neue';font-size:28px;
  color:rgba(255,215,0,0.4);letter-spacing:4px;
}
.idle-sub{
  font-size:13px;color:rgba(255,255,255,0.25);
  letter-spacing:2px;margin-top:-10px;
}

/* REVEAL BOX */
.reveal-box{width:100%;display:none;flex-direction:column;align-items:center;gap:0;}
.reveal-box.active{display:flex;}

.counter-badge{
  font-family:'Bebas Neue';font-size:12px;
  color:rgba(255,215,0,0.5);letter-spacing:5px;
  margin-bottom:16px;opacity:0;
  transition:opacity 0.5s ease;
}
.counter-badge.visible{opacity:1;}

/* TEXT AREA */
.text-area{
  background:linear-gradient(135deg,rgba(255,215,0,0.06) 0%,rgba(0,0,0,0.7) 50%,rgba(255,215,0,0.04) 100%);
  border:1px solid rgba(255,215,0,0.15);
  border-radius:14px;padding:24px 22px;
  width:100%;margin-bottom:28px;
  opacity:0;transform:translateY(24px);
  transition:opacity 0.6s ease,transform 0.6s ease;
}
.text-area.visible{opacity:1;transform:translateY(0);}

.raridade-line{
  font-family:'Bebas Neue';font-size:12px;
  letter-spacing:5px;margin-bottom:10px;text-align:center;
}
.raridade-epica{color:#FFD700;}
.raridade-lendaria{color:#ff6b35;text-shadow:0 0 10px rgba(255,107,53,0.5);}
.raridade-capa{color:rgba(255,215,0,0.4);}

.player-name-reveal{
  font-family:'Bebas Neue';
  font-size:clamp(26px,5vw,42px);
  background:linear-gradient(135deg,#b8860b,#FFD700,#f0c040);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;letter-spacing:3px;
  text-align:center;line-height:1;margin-bottom:14px;
}

.reveal-text{
  font-size:clamp(14px,2.5vw,16px);
  color:rgba(255,255,255,0.82);
  line-height:1.7;letter-spacing:0.2px;
}
.cursor{
  display:inline-block;width:2px;height:1em;
  background:#FFD700;margin-left:2px;
  vertical-align:middle;
  animation:blink 0.7s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* CARD */
.card-wrap{
  opacity:0;
  transform:scale(0.75) translateY(40px) rotate(-4deg);
  transition:opacity 0.9s cubic-bezier(0.34,1.56,0.64,1),
             transform 0.9s cubic-bezier(0.34,1.56,0.64,1);
  width:100%;max-width:400px;
}
.card-wrap.visible{opacity:1;transform:scale(1) translateY(0) rotate(0);}
.card-wrap img{
  width:100%;border-radius:14px;
  box-shadow:
    0 0 0 3px rgba(255,215,0,0.5),
    0 0 50px rgba(255,215,0,0.25),
    0 24px 70px rgba(0,0,0,0.85);
}

/* NAV DOTS */
.nav-dots{
  display:flex;gap:8px;margin-top:28px;
  flex-wrap:wrap;justify-content:center;
}
.dot{
  width:10px;height:10px;border-radius:50%;
  background:rgba(255,215,0,0.15);
  border:1px solid rgba(255,215,0,0.25);
  transition:all 0.2s ease;
}
.dot.active{background:#FFD700;box-shadow:0 0 8px rgba(255,215,0,0.6);}
.dot.done{background:rgba(255,215,0,0.45);}

/* NAV BUTTONS — only after all revealed */
.nav-buttons{
  display:none;
  gap:12px;margin-top:20px;flex-wrap:wrap;justify-content:center;
}
.nav-buttons.visible{display:flex;}
.btn-nav{
  font-family:'Bebas Neue';font-size:15px;letter-spacing:2px;
  padding:10px 22px;border-radius:6px;border:none;cursor:pointer;
  background:rgba(255,215,0,0.12);color:#FFD700;
  border:1px solid rgba(255,215,0,0.3);
  transition:all 0.2s ease;
}
.btn-nav:hover{background:rgba(255,215,0,0.22);transform:scale(1.05);}

/* FLASH */
.card-flash{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at center,rgba(255,215,0,0.18) 0%,transparent 70%);
  pointer-events:none;z-index:100;
  opacity:0;transition:opacity 0.3s ease;
}
.card-flash.flash{opacity:1;}

/* COMPLETED BANNER */
.completed-banner{
  display:none;
  font-family:'Bebas Neue';font-size:16px;
  color:#FFD700;letter-spacing:4px;
  text-align:center;margin-top:24px;
  padding:14px 24px;
  border:1px solid rgba(255,215,0,0.3);
  border-radius:8px;
  background:rgba(255,215,0,0.05);
  animation:glow 2s infinite;
}
.completed-banner.visible{display:block;}
@keyframes glow{
  0%,100%{box-shadow:0 0 10px rgba(255,215,0,0.2);}
  50%{box-shadow:0 0 25px rgba(255,215,0,0.5);}
}

@media(max-width:480px){
  .card-wrap{max-width:100%;}
}

.flash-epic {
  animation: flashEpic 0.6s ease-out forwards !important;
}
@keyframes flashEpic {
  0%   { opacity: 0; background: white; }
  20%  { opacity: 1; background: radial-gradient(circle, #FFD700, #FF8C00, white); }
  60%  { opacity: 0.8; }
  100% { opacity: 0; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-label">★ Edição Especial ★</div>
  <div class="header-title">SELEÇÃO DE ALCÂNTARA</div>
  <div class="header-sub">FIFA World Cup 2026 · Revelação de Cromos</div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">A INICIAR...</div>
</div>

<div class="stage">
  <div class="idle-screen" id="idleScreen">
    <div class="idle-icon">🎴</div>
    <div class="idle-title">REVELAÇÃO AUTOMÁTICA</div>
    <div class="idle-sub">A começar em instantes...</div>
  </div>

  <div class="reveal-box" id="revealBox">
    <div class="counter-badge" id="counterBadge"></div>
    <div class="text-area" id="textArea">
      <div class="raridade-line" id="raridadeLine"></div>
      <div class="player-name-reveal" id="playerName"></div>
      <span class="reveal-text" id="revealText"></span><span class="cursor" id="cursor"></span>
    </div>
    <div class="card-wrap" id="cardWrap">
      <img id="cardImg" src="" alt="">
    </div>
    <div class="nav-dots" id="navDots"></div>
    <div class="completed-banner" id="completedBanner">
      🏆 TODOS OS CROMOS REVELADOS · AMIZADE É O NOSSO MUNDIAL 🏆
    </div>
    <div class="nav-buttons" id="navButtons">
      <button class="btn-nav" onclick="prevPlayer()">◀ ANTERIOR</button>
      <button class="btn-nav" onclick="nextPlayer()">PRÓXIMO ▶</button>
    </div>
  </div>
</div>

<div class="card-flash" id="cardFlash"></div>

const INTERVAL_MS = 2 * 60 * 1000; // 2 minutes fixed
const PLAYERS = [
  {

  },
  {
    "num": 1,
    "nome": "ANA RIBEIRO",
    "raridade": "ÉPICA",
    "raridade_stars": "⭐⭐⭐⭐⭐",
    "key": "s_ana_ribeiro",
    "tipo": "cromo",
    "texto": "Olho clínico para o que é bonito. Doma cores e tipografias com uma criatividade sem limites. De dia resolve design, de noite a Zumba não sabe o que a espera. Não lhe mostres um design mau. Ela sorri. Mas sofre por dentro. Comic Sans: proibido. Design Police: Approved. Origem: Miratejo, Margem Sul. Não aparece em qualquer bairro. Dificuldade de coleção: épica.",
    "key_original": "o_ana_ribeiro"
  },
  {
    "num": 2,
    "nome": "CARLA AGOAS",
    "raridade": "LENDÁRIA",
    "raridade_stars": "⭐⭐⭐⭐⭐",
    "key": "s_carla_agoas",
    "tipo": "cromo",
    "texto": "Cabelos em caracóis que têm vida própria. Sempre a par de tudo. Tudo mesmo. Na cozinha, o problema não é a qualidade. É a quantidade! Vais jantar? Sais com marmita para a semana. Sporting sempre! Uma devoção que ultrapassa fronteiras. Já foi vê-los jogar a terras onde os Vikings usavam o futebol como pretexto para invadir! Em casa vive um ser misterioso chamado Chernobyl. É um cão. Dizem que é inofensivo. O nome sugere outra coisa. Se a encontrares, prepara-te para ficar pelo menos duas horas. Dificuldade de coleção: média.",
    "key_original": "o_carla_agoas"
  },
  {
    "num": 3,
    "nome": "ISABEL BAIRRÃO",
    "raridade": "ÉPICA",
    "raridade_stars": "⭐⭐⭐⭐⭐",
    "key": "s_isabel_bairao",
    "tipo": "cromo",
    "texto": "Origem: Tramagal. Terra pequena, personalidade grande. Cumprimenta com um beijinho. Um. Não insistas no segundo. Defende causas com uma garra que só se explica por anos a garantir que ninguém dorme mal. Competição corre-lhe nas veias: em discussões, em jogos de tabuleiro, em listas de preços, num restaurante. De noite, o karaoke é dela! Fado, pimba, clássicos... entoa tudo com uma convicção jurídica inabalável. Não a deixes pegar na conta. Vai estudá-la com a atenção de quem lê uma cláusula contratual. Garra e princípios. Lealdade e amizade. Coragem e firmeza. Vem com termos e condições. Dificuldade de coleção: alta.",
    "key_original": "o_isabel_bairao"
  },
  {
    "num": 4,
    "nome": "JOANA FRADE",
    "raridade": "ÉPICA",
    "raridade_stars": "⭐⭐⭐⭐⭐",
    "key": "s_joana_frade",
    "tipo": "cromo",
    "texto": "Caracóis perfeitos. Não toques. Não perguntes. Segue em frente. Sabe tudo sobre música. Tem programa de rádio. Não perde um concerto seja em que ponto do mapa estiver. Organiza os planos para o grupo com uma eficiência que envergonharia qualquer secretária-geral de sindicato. Agenda feita. Local reservado. Tu só tens de aparecer — e aparecer a horas. Barbie Jolas: glamour num copo, sempre. Imperial. Sempre a imperial. Feminista de convicção. Mandona assumida. Visão clara de como as coisas devem funcionar. Spoiler: à maneira dela. E normalmente ela tem razão. Dificuldade de coleção: baixa — ela já organizou o encontro.",
    "key_original": "o_joana_frade"
  },
  {
    "num": 5,
    "nome": "JOÃO SANTOS",
    "raridade": "ÉPICA",
    "raridade_stars": "⭐⭐⭐⭐⭐",
    "key": "s_joao_santos",
    "tipo": "cromo",
    "texto": "Alto de Santo Amaro. Alto, de bairro — e com uma energia de mar que não abandona mesmo em terra firme. Apelidado de Fofinho pelo grupo. O apelido diz tudo. E não diz nada. Conhece as melhores ondas. O problema é que quando lá chegas, as ondas já foram. Ele encolhe os ombros. O mar é assim. Tem gráfica e imprime tudo para toda a gente. Convites, cartazes, flyers, aquela coisa de que precisas para amanhã de manhã. É o recurso oficial do grupo. A uma jola nunca disse que não. É um princípio de vida, quase uma filosofia. Dificuldade de coleção: média.",
    "key_original": "o_joao_santos"
  },
  {
    "num": 6,
    "nome": "LILIANA MARTINS",
    "raridade": "ÉPICA",
    "raridade_stars": "⭐⭐⭐⭐★",
    "key": "s_liliana_martins",
    "tipo": "cromo",
    "texto": "Aparece sem avisar — literalmente. Está sempre algures entre um fuso horário e outro, mas quando aterra, fá-lo com cabelos longos impecáveis e um bronze que envergonha quem passou o verão na praia sem sair do lugar. Falando em praia: é o seu habitat natural. O mar reconhece-a. Na cozinha, o seu domínio é a sopa — mas não qualquer sopa. Tem de ser biológica, consciente, alinhada com o universo. Uma sopa com propósito. Próximo destino: ninguém sabe nem ela. A sesta não é um luxo. É uma necessidade clínica e um pilar da sua identidade. Quando acorda, tem muito para contar. Conta mesmo, com entusiasmo, com detalhe, e preferencialmente a centímetros do teu ouvido. Dificuldade de coleção: muito alta. Está sempre a voar.",
    "key_original": "o_liliana_martins"
  },
  {
    "num": 7,

    "raridade": "LENDÁRIA",

    "key": "s_luis_justino",
    "tipo": "cromo",
    "texto": "Conhecido no bairro como O Bombeiro. Não por apagar fogos, mas porque onde aparece, a energia inflama tudo à volta. Sorriso permanente, disposição a toda a hora e uma frase de marca registada: 'Está tudo na boa.' A moto corta o trânsito de Lisboa com a elegância de quem conhece cada atalho — porque provavelmente foi ele que os construiu. Aprecia um bom vinho com a seriedade de quem merece cada copo depois de tudo o que faz num dia normal. Controla o trânsito da Carris. Tatua. Cozinha a nível profissional. Carpinteia. Faz bodyboard. Pesca à cana. Mergulha para caça submarina. Diz que pesca lavagantes. Ninguém os viu. Dificuldade de coleção: baixa.",

  {

    "nome": "SOFIA AFONSO",
    "raridade": "LENDÁRIA",

  {

    "raridade_stars": "⭐⭐⭐⭐★",

    "tipo": "cromo",
    "texto": "Homem de paciência infinita — para os amigos, para a vida e para qualquer plano que precisa de alguém que realmente o faça acontecer. Faz muito, parece que não faz nada, e quando te apercebes já está feito. No padel, o que lhe falta em perícia sobra-lhe em dedicação. Não lhe ofereças uma jola. Gin, sim — mas não qualquer um. Tem critérios, tem preferências, tem opinião. Há sempre um sistema, mesmo que ninguém perceba qual. Resolve problemas antes de eles existirem. Organizado. Discreto. Eficiente. Sem drama. Debugga a vida com calma. AI Master — porque a calma que resolve também programa. Dificuldade de coleção: alta.",

    "key_original": "o_ricardo_rodrigues"
  },
  {

    "key_original": "o_tiago_maia"
  },
  {
    "num": 12,
    "nome": "SÍLVIA PINTO",
    "raridade": "LENDÁRIA",
    "raridade_stars": "⭐⭐⭐⭐⭐⭐",

    "key_original": "o_silvia_pinto"
  },
  {
    "num": 13,
    "nome": "SALOMÉ PASCOAL",
    "raridade": "LENDÁRIA",
    "raridade_stars": "⭐⭐⭐⭐⭐⭐",

let currentIndex = 0;
let allRevealed = false;
let autoTimer = null;
let progressTimer = null;
let progressStart = null;
let typingTimeout = null;

function init() {
  buildDots(-1);
  // Start first reveal after short delay
  setTimeout(() => showPlayer(0), 1500);
}

function scheduleNext() {
  clearTimeout(autoTimer);
  clearInterval(progressTimer);

  if (allRevealed) return;

  const nextIdx = currentIndex + 1;
  if (nextIdx >= PLAYERS.length) {
    // All done
    allRevealed = true;
    document.getElementById('completedBanner').classList.add('visible');
    document.getElementById('navButtons').classList.add('visible');
    document.getElementById('progressLabel').textContent = '✦ TODOS OS CROMOS REVELADOS ✦';
    document.getElementById('progressFill').style.width = '100%';
    return;
  }

  progressStart = Date.now();

  progressTimer = setInterval(() => {
    const elapsed = Date.now() - progressStart;
    const pct = Math.min(100, (elapsed / INTERVAL_MS) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    const rem = Math.max(0, Math.ceil((INTERVAL_MS - elapsed) / 1000));
    const mins = Math.floor(rem / 60);
    const secs = rem % 60;
    document.getElementById('progressLabel').textContent =
      `PRÓXIMO CROMO EM ${mins}:${String(secs).padStart(2,'0')}`;
  }, 200);

  autoTimer = setTimeout(() => {
    currentIndex++;
    showPlayer(currentIndex);
    scheduleNext();
  }, INTERVAL_MS);
}

function showPlayer(index) {
  const p = PLAYERS[index];

  document.getElementById('idleScreen').style.display = 'none';
  document.getElementById('revealBox').classList.add('active');

  // Reset
  const textArea = document.getElementById('textArea');
  const cardWrap = document.getElementById('cardWrap');
  const counterBadge = document.getElementById('counterBadge');
  textArea.classList.remove('visible');
  cardWrap.classList.remove('visible');
  counterBadge.classList.remove('visible');
  document.getElementById('revealText').textContent = '';
  document.getElementById('cursor').style.display = 'inline-block';
  clearTimeout(typingTimeout);

  // Content
  const isCapa = p.tipo === 'capa';
  const isLendaria = p.raridade === 'LENDÁRIA';

  counterBadge.textContent = isCapa
    ? p.raridade.toUpperCase()
    : `CROMO ${String(index - 1).padStart(2,'0')} DE ${PLAYERS.length - 2}`;

  const raridadeEl = document.getElementById('raridadeLine');
  if (isCapa) {
    raridadeEl.textContent = '';
    raridadeEl.className = 'raridade-line raridade-capa';
  } else {
    raridadeEl.textContent = `${p.raridade_stars} RARIDADE: ${p.raridade} ${p.raridade_stars}`;
    raridadeEl.className = 'raridade-line ' + (isLendaria ? 'raridade-lendaria' : 'raridade-epica');
  }

  document.getElementById('playerName').textContent = p.nome;
  document.getElementById('cardImg').src = IMAGES[p.key] || '';

  buildDots(index);

  // Animate
  setTimeout(() => counterBadge.classList.add('visible'), 200);
  setTimeout(() => textArea.classList.add('visible'), 500);
  setTimeout(() => typeText(p.texto, index), 900);
}

function typeText(text, playerIndex) {
  clearTimeout(typingTimeout);
  const el = document.getElementById('revealText');
  el.textContent = '';
  let i = 0;
  // Speed: finish typing in ~40% of the interval, or max 60s
  const typeDuration = Math.min(INTERVAL_MS * 0.4, 55000);
  const speed = Math.max(10, Math.floor(typeDuration / text.length));

  function type() {
    if (currentIndex !== playerIndex) return;
    if (i < text.length) {
      el.textContent += text[i++];
      typingTimeout = setTimeout(type, speed);
    } else {
      document.getElementById('cursor').style.display = 'none';
      setTimeout(() => showCard(playerIndex), 700);
    }
  }
  type();
}

function showCard(playerIndex) {
  if (currentIndex !== playerIndex) return;
  const p = PLAYERS[playerIndex];
  const cardImg = document.getElementById('cardImg');
  const flash = document.getElementById('cardFlash');

  if (p.tipo === 'capa' || !p.key_original || !p.key) {
    // Single phase: just show what we have
    cardImg.src = IMAGES[p.key] || IMAGES[p.key_original] || '';
    document.getElementById('cardWrap').classList.add('visible');
    flash.classList.add('flash');
    setTimeout(() => flash.classList.remove('flash'), 500);
    return;
  }

  // Phase 1: show original sticker
  cardImg.src = IMAGES[p.key_original] || '';
  document.getElementById('cardWrap').classList.add('visible');
  flash.classList.add('flash');
  setTimeout(() => flash.classList.remove('flash'), 500);

  // Phase 2: after 30s → epic flash → switch to special sticker
  setTimeout(() => {
    if (currentIndex !== playerIndex) return;
    // Big epic flash
    flash.classList.add('flash-epic');
    setTimeout(() => {
      flash.classList.remove('flash-epic');
      cardImg.src = IMAGES[p.key] || '';
    }, 300);
  }, 30000);
}

function nextPlayer() {
  if (!allRevealed) return;
  currentIndex = (currentIndex + 1) % PLAYERS.length;
  showPlayer(currentIndex);
}

function prevPlayer() {
  if (!allRevealed) return;
  currentIndex = (currentIndex - 1 + PLAYERS.length) % PLAYERS.length;
  showPlayer(currentIndex);
}

function buildDots(activeIndex) {
  const container = document.getElementById('navDots');
  container.innerHTML = '';
  PLAYERS.forEach((p, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' +
      (i === activeIndex ? ' active' : (i < activeIndex ? ' done' : ''));
    dot.title = p.nome;
    if (allRevealed) dot.onclick = () => { currentIndex = i; showPlayer(i); };
    container.appendChild(dot);
  });
}

// Start
window.addEventListener('load', () => init());
